name: apprise-mcp

# Local development stack. Builds from this checkout.
services:
  apprise-mcp:
    extends:
      file: docker-compose.prod.yml
      service: apprise-mcp
    image: apprise-mcp:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  jakenet:
    name: ${DOCKER_NETWORK:-jakenet}
    external: true
